name: Update Moonshiners Broadcasts

on:
  workflow_dispatch:

  schedule:
    - cron: "0 12,15,18 * * 3"
      timezone: "America/New_York"

    - cron: "30 13,16,19 * * 3"
      timezone: "America/New_York"

    - cron: "45 18 * * 3"
      timezone: "America/New_York"

    - cron: "40,50,54,58 19 * * 3"
      timezone: "America/New_York"

    - cron: "2,6,10,20,30 20 * * 3"
      timezone: "America/New_York"

    - cron: "0,30 21-23 * * 3"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: moonshiners-broadcast-update
  cancel-in-progress: false

jobs:
  update-broadcasts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update broadcasts JSON
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: PLjydJbqa-gB6SKdCrgnkAoI4wZUbMjemU
          BROADCASTS_JSON_PATH: data/broadcasts.json
        run: node scripts/update-broadcasts.mjs

      - name: Commit changed broadcast data
        run: |
          if git diff --quiet -- data/broadcasts.json; then
            echo "No broadcast changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/broadcasts.json
          git commit -m "Update Moonshiners broadcasts"
          git push
