name: Update SimRacerHub Race Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project packages
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run race-results scraper
        run: node results-scraper.js

      - name: Save updated race results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results-raw.json results.json race-results/
          git commit -m "Update SimRacerHub race results"
          git push
